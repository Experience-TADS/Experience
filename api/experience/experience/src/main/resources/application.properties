spring.application.name=experience

# ─── Banco de dados ───────────────────────────────────────────────────────────
# Em produção (AWS EC2), SPRING_DATASOURCE_URL é injetado via variável de ambiente.
# O valor após ':' é o fallback para desenvolvimento local.
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db_experience}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─── H2 Console (desativado) ──────────────────────────────────────────────────
spring.h2.console.enabled=false

# ─── Logs ─────────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.com.senai.experience=INFO

# ─── JWT ──────────────────────────────────────────────────────────────────────
# Em produção, JWT_SECRET vem de variável de ambiente (nunca hardcoded no repositório).
jwt.secret=${JWT_SECRET:dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yand0dG9rZW5zMTIzNDU2Nzg=}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── E-mail (AWS SES em produção, Gmail para dev local) ───────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── CORS ─────────────────────────────────────────────────────────────────────
# Em produção, aponta para o domínio do AWS Amplify (app mobile / frontend).
# Exemplo: https://app.experience.com,https://main.d1abc123.amplifyapp.com
# Para Expo Go no celular, adicione o IP local: http://192.168.x.x:8080
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8081,exp://localhost:8081}
