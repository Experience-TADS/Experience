services:

  # ── Banco de dados ───────────────────────────────────────────────────────────
  postgres:
    image: 'postgres:16'
    restart: always
    environment:
      POSTGRES_DB: db_experience
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?Defina SPRING_DATASOURCE_PASSWORD no .env}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Spring Boot ──────────────────────────────────────────────────────────
  api:
    build:
      context: .       # pasta experience/ que contém pom.xml e src/
      dockerfile: Dockerfile
    restart: always
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Banco — aponta para o container postgres acima
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_experience
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

      # JWT
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET no .env}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}

      # E-mail
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}

      # CORS — coloque aqui o IP público da EC2 ou domínio do Amplify
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}

volumes:
  postgres_data:

# ── Como usar ──────────────────────────────────────────────────────────────────
# 1. Copie .env.example para .env e preencha os valores
# 2. Na EC2: docker compose -f docker-compose.prod.yaml up -d --build
# 3. Verifique: curl http://localhost:8080/health
