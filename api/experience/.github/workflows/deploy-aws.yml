name: Deploy Backend — AWS EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # permite disparo manual

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: experience-api
  ECS_SERVICE: experience-service
  ECS_CLUSTER: experience-cluster
  CONTAINER_NAME: experience-api

jobs:
  # ── Job 1: Build e Push da imagem Docker para o ECR ──────────────────────
  build-and-push:
    name: Build & Push para ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build da imagem Docker e push para ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: api/experience
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Atualizar task definition do ECS com a nova imagem
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .github/task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy no ECS (rolling update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

# ── Secrets necessários no GitHub ────────────────────────────────────────────
# Configure em: Settings → Secrets and variables → Actions
#
#   AWS_ACCESS_KEY_ID      → chave de acesso da IAM Role com permissão ECR + ECS
#   AWS_SECRET_ACCESS_KEY  → chave secreta da IAM Role
#
# As variáveis de ambiente da aplicação (DB, JWT, MQTT, etc.) devem ser
# configuradas diretamente na task definition do ECS ou via AWS Secrets Manager,
# NUNCA como secrets do GitHub.
