services:

  # ─── BANCO DE DADOS ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: experience-postgres
    environment:
      POSTGRES_DB: db_experience
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: experience-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@experience.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    depends_on:
      - postgres

  # ─── API SPRING BOOT ───────────────────────────────────────────────────────
  api:
    build:
      context: ./api/experience
      dockerfile: Dockerfile
    container_name: experience-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_experience
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
    depends_on:
      postgres:
        condition: service_healthy

  # ─── CHATBOT FLASK ─────────────────────────────────────────────────────────
  chatbot:
    build:
      context: ./web
      dockerfile: Dockerfile.flask
    container_name: experience-chatbot
    ports:
      - "5000:5000"

  # ─── FRONTEND NEXT.JS ──────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: experience-web
    ports:
      - "3000:3000"
    depends_on:
      - api
      - chatbot

  # ─── MQTT / IOT ────────────────────────────────────────────────────────────
  mqtt:
    image: eclipse-mosquitto:2
    container_name: experience-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  simulador:
    build:
      context: ./mqtt/simulador
      dockerfile: Dockerfile
    container_name: experience-simulador
    depends_on:
      - mqtt

  nodered:
    image: nodered/node-red
    container_name: experience-nodered
    ports:
      - "1880:1880"
    depends_on:
      - mqtt
    volumes:
      - nodered_data:/data

  influxdb:
    image: influxdb:2.7
    container_name: experience-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123
      DOCKER_INFLUXDB_INIT_ORG: senai
      DOCKER_INFLUXDB_INIT_BUCKET: linha_producao
      TZ: America/Sao_Paulo
    volumes:
      - influxdb_data:/var/lib/influxdb2

  grafana:
    image: grafana/grafana
    container_name: experience-grafana
    ports:
      - "3001:3000"
    environment:
      GF_DEFAULT_APP_MODE: production
      TZ: America/Sao_Paulo
    depends_on:
      - influxdb

volumes:
  postgres_data:
  influxdb_data:
  nodered_data:
