# =============================================
# PERFIL DE PRODUCAO - AWS
# Variaveis sensiveis vem de variaveis de ambiente
# =============================================

spring.application.name=experience

# Banco de dados - RDS PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT - chave vem de variavel de ambiente
jwt.secret=${JWT_SECRET}

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Porta (Elastic Beanstalk usa 5000 por padrao)
server.port=${PORT:8080}

# CORS - permite o frontend na CloudFront chamar o backend
spring.web.cors.allowed-origins=${FRONTEND_URL:*}
